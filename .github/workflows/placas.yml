name: Placas a Telegram

on:
  schedule:
    # Horarios fijos en UTC (AR = UTC-3)
    # 12:00 AR = 15:00 UTC
    # 13:00 AR = 16:00 UTC
    # 14:00 AR = 17:00 UTC
    # 15:00 AR = 18:00 UTC
    # 16:00 AR = 19:00 UTC
    # 17:00 AR = 20:00 UTC
    # 17:30 AR = 20:30 UTC
    - cron: '0 15 * * 1-5'     # 12:00 AR — imagen web
    - cron: '0 16 * * 1-5'     # 13:00 AR — visor ARG
    - cron: '0 17 * * 1-5'     # 14:00 AR — imagen web
    - cron: '0 18 * * 1-5'     # 15:00 AR — visor ARG
    - cron: '0 19 * * 1-5'     # 16:00 AR — imagen web
    - cron: '0 20 * * 1-5'     # 17:00 AR — imagen cierre + visor ARG
    - cron: '30 20 * * 1-5'    # 17:30 AR — visor BCRA

  workflow_dispatch:   # ejecución manual para pruebas

permissions:
  contents: write

jobs:
  placas:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Playwright + Chromium
        run: |
          playwright install chromium --with-deps

      # ── Instalar certificado SSL del BCRA ─────────────────────
      # api.bcra.gob.ar usa un certificado intermedio que Ubuntu no
      # incluye por defecto. Se descarga e instala manualmente para
      # que requests pueda verificarlo sin necesidad de verify=False.
      - name: Instalar certificado BCRA
        run: |
          # Descargar el certificado intermedio del BCRA
          curl -sk "https://api.bcra.gob.ar" || true
          # Instalar ca-certificates extra y actualizar el bundle
          sudo apt-get install -y -q ca-certificates 2>/dev/null || true
          # Descargar cert de Let's Encrypt ISRG Root X1 (que usa BCRA)
          curl -sL "https://letsencrypt.org/certs/isrgrootx1.pem" \
               -o /usr/local/share/ca-certificates/isrgrootx1.crt 2>/dev/null || true
          # Descargar cert R3 intermediario
          curl -sL "https://letsencrypt.org/certs/lets-encrypt-r3.pem" \
               -o /usr/local/share/ca-certificates/lets-encrypt-r3.crt 2>/dev/null || true
          sudo update-ca-certificates 2>/dev/null || true
          echo "✅ Certificados actualizados"

      - name: Ejecutar Placas
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: "America/Argentina/Buenos_Aires"
        run: python main.py

      # ── Guardar estado con reintento ante conflictos de push ───
      # El error "rejected (fetch first)" ocurre cuando dos workflows
      # corren simultáneamente. El pull --rebase lo resuelve.
      - name: Guardar estado en repo
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          [ -f estado_envios.csv ] && git add estado_envios.csv
          [ -f visor_arg.png     ] && git add visor_arg.png
          [ -f visor_bcra.png    ] && git add visor_bcra.png
          git diff --staged --quiet && echo "Sin cambios nuevos" || git commit -m "Bot: placas [skip ci]"
          git pull --rebase origin main || true
          git push || echo "Sin cambios que pushear"
